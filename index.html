<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARA AI - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #002766, #004c99);
            margin: 0;
            color: #fff;
        }
        .language-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        button {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        p {
            font-size: 22px;
            font-weight: 300;
        }
        .contact {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        .contact img {
            width: 20px;
            height: 20px;
        }
    </style>
    <script>
        function changeLanguage(lang) {
            if (lang === 'pl') {
                document.getElementById('org-name').innerText = "Stowarzysznie Badań i Zastosowań Sztucznej Inteligencji";
                document.getElementById('coming-soon').innerText = "Wkrótce...";
            } else {
                document.getElementById('org-name').innerText = "Association for Research and Applications of Artificial Intelligence";
                document.getElementById('coming-soon').innerText = "Coming soon...";
            }
        }
    </script>
</head>
<body>
    <div class="language-switch">
        <button onclick="changeLanguage('en')">English</button>
        <button onclick="changeLanguage('pl')">Polski</button>
    </div>
    <h1 id="org-name">Association for Research and Applications of Artificial Intelligence</h1>
    <p id="coming-soon">Coming soon...</p>
    <div class="contact">
        <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email Icon">
        <span>kontakt@araai.org</span>
    </div>
</body>
</html>
